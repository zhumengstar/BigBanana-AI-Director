  cutos-api:
    platform: linux/amd64
    image: registry.cn-hangzhou.aliyuncs.com/tree456/bigbanana-ai-director:cutos-3.3.0
    container_name: bigbanana-ai-director-cutos-api
    environment:
      CUTOS_API_PORT: "8789"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    expose:
      - "8789"
    restart: unless-stopped

  backend:
    platform: linux/amd64
    image: registry.cn-hangzhou.aliyuncs.com/tree456/bigbanana-ai-director:media-3.3.0
    container_name: bigbanana-ai-director-backend
    working_dir: /app
    command: ["node", "/app/server/backendServer.mjs"]
    environment:
      BIGBANANA_BACKEND_PORT: "8790"
      MEDIA_PROXY_ALLOWED_HOSTS: "volces.com,amazonaws.com,amazonaws.com.cn,aliyuncs.com,aliyuncs.com.cn,tree456.com,muling.store,api.antsk.cn"
      MEDIA_PROXY_ALLOWED_PROTOCOLS: "https"
      MEDIA_PROXY_TIMEOUT_MS: "120000"
      MEDIA_PROXY_MAX_URL_LENGTH: "4096"
      MEDIA_PROXY_CORS_ORIGIN: "*"
      NEW_API_ALLOWED_HOSTS: "${NEW_API_ALLOWED_HOSTS:-}"
      NEW_API_ALLOW_PRIVATE_HOSTS: "false"
      NEW_API_DEFAULT_ENDPOINT: "${NEW_API_DEFAULT_ENDPOINT:-}"
      PROJECT_STORE_PORT: "8790"
      PROJECT_STORE_DATA_DIR: "/data"
      PROJECT_STORE_BACKUP_FILE: "project-store-backup.json"
      PROJECT_STORE_NEW_API_BASE_URL: "http://127.0.0.1:8790"
      PROJECT_STORE_PUBLIC_BASE_URL: "${PROJECT_STORE_PUBLIC_BASE_URL:-https://bigbanana.muling.store}"
    volumes:
      - ./server/backendServer.mjs:/app/server/backendServer.mjs:ro
      - ./server/mediaProxyServer.mjs:/app/server/mediaProxyServer.mjs:ro
      - ./server/newApiProxyCore.mjs:/app/server/newApiProxyCore.mjs:ro
      - ./server/projectStoreServer.mjs:/app/server/projectStoreServer.mjs:ro
      - ./data:/data
    expose:
      - "8790"
    restart: unless-stopped
