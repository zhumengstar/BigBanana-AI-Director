server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    # ============================================
    # Gzip 压缩 - 提升页面加载速度 (Core Web Vitals)
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/ld+json
        image/svg+xml
        font/woff2;

    # ============================================
    # SEO: 关键文件路由
    # ============================================
    
    # robots.txt - 确保搜索引擎可以访问
    location = /robots.txt {
        access_log off;
        log_not_found off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain; charset=UTF-8";
    }

    # sitemap.xml - 搜索引擎站点地图
    location = /sitemap.xml {
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml; charset=UTF-8";
    }

    # favicon.ico - 避免 404 日志噪音
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 项目存储同步脚本 - 强制每次拉取最新版本，避免浏览器命中旧缓存
    location = /bb-project-store-sync.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        access_log off;
    }

    # 异步图片任务热补丁 - 也强制禁用缓存
    location = /bb-async-image-tasks.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        access_log off;
    }



    # ============================================
    # Seedance NewAPI/OpenAI-compatible video proxy
    # Same-origin HTTPS entry to avoid browser mixed-content blocking.
    # ============================================
    location /api/seedance-proxy/ {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_set_header Host 8.138.181.181:3000;
        proxy_pass http://8.138.181.181:3000/;
    }

    # ============================================
    # BigBanana unified local backend
    # ============================================
    location = /api/media-proxy {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_pass http://backend:8790;
    }

    location /api/new-api {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_pass http://backend:8790;
    }

    location /api/cutos {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_pass http://cutos-api:8789;
    }

    location /api/agent {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_pass http://cutos-api:8789;
    }

    location ^~ /api/project-store/ {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_pass http://backend:8790;
    }

    # ============================================
    # Same-origin proxy for ai.muling.store OpenAI-compatible API
    # Avoid browser CORS/fetch failures on long image generation responses.
    # ============================================
    location /api/ai-muling/ {
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_ssl_server_name on;
        proxy_set_header Host ai.muling.store;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass https://ai.muling.store/;
    }

    # ============================================
    # 前端路由 (SPA)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # 入口 HTML - 禁止缓存确保 SEO 爬虫获取最新内容
    # ============================================
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header X-Robots-Tag "index, follow" always;
    }

    # 其他 HTML 页面（如 seo-check.html）
    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    # ============================================
    # 静态资源 - 长期缓存 (提升 LCP/FCP)
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # 安全头部 (同时利于 SEO 信任度)
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ============================================
    # 性能优化 (Core Web Vitals)
    # ============================================
    
    # 连接优化
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # 缓冲区优化
    client_max_body_size 200m;
    client_body_buffer_size 1m;
}
